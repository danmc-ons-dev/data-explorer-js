<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Plotter</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <h1>Welcome to the Climate Health Data Explorer!</h1>
    </header>

    <div class="container">
        <!-- Tab Navigation -->
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <a class="nav-link active" id="plot1-tab" data-toggle="tab" href="#plot1" role="tab"
                    aria-controls="plot1" aria-selected="true">Plot 1</a>
            </li>
            <li class="nav-item" role="presentation">
                <a class="nav-link" id="plot2-tab" data-toggle="tab" href="#plot2" role="tab" aria-controls="plot2"
                    aria-selected="false">Plot 2</a>
            </li>
        </ul>

        <!-- Tab contents -->
        <div class="tab-content" id="myTabContent">
            <!-- Plot 1 Content -->
            <div class="tab-pane fade show active" id="plot1" role="tabpanel" aria-labelledby="plot1-tab">
                <div class="mt-3">
                    <input type="file" id="csvInput1">
                    <select id="xColumnPlot1"></select>
                    <select id="yColumnPlot1"></select>
                    <button onclick="plotSelectedColumns(1)">Plot Data</button>
                    <div id="plot1Display"></div>
                </div>
            </div>

            <!-- Plot 2 Content -->
            <div class="tab-pane fade" id="plot2" role="tabpanel" aria-labelledby="plot2-tab">
                <div class="mt-3">
                    <input type="file" id="csvInput2">
                    <select id="xColumnPlot2"></select>
                    <select id="yColumnPlot2"></select>
                    <button onclick="plotSelectedColumns(2)">Plot Data</button>
                    <div id="plot2Display"></div>
                </div>
            </div>
        </div>


        <!-- Required Bootstrap JS and dependencies -->
        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

        <!-- PapaParse Library -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

        <!-- Plotly Library -->
        <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

        <!-- Your main JavaScript -->
        <script src="js/main.js"></script>

        <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

</body>

</html>
