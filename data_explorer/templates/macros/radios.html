{# templates/macros/forms.html #}
{% macro radio_group(name, legend, options, selected=None, hint=None) %}
  <div class="ons-question ons-u-mb-xl ons-u-mt-no">
    <div class="ons-question__answer ons-u-mb-l">
      <fieldset class="ons-fieldset">
        <legend class="ons-fieldset__legend ons-u-mb-no">
          <p id="{{ name }}-legend-title" class="ons-u-fs--b">{{ legend }}</p>
        </legend>
        {% if hint %}
          <p id="{{ name }}-hint"
             class="ons-hint ons-label__description ons-input--with-description">{{ hint }}</p>
        {% endif %}
        <div class="ons-input-items">
          <div class="ons-radios__items">
            {% for option in options %}
              {% set id = option.id if option.id is defined else name ~ '-'
                            ~ loop.index %}
              <span class="ons-radios__item">
                <span class="ons-radio">
                  <input type="radio"
                         id="{{ id }}"
                         class="ons-radio__input ons-js-radio"
                         name="{{ name }}"
                         value="{{ option.value }}"
                         {% if selected == option.value %}checked{% endif %} />
                  <label class="ons-radio__label" for="{{ id }}" id="{{ id }}-label">{{ option.label }}</label>
                </span>
              </span>
              <br />
            {% endfor %}
          </div>
        </div>
      </fieldset>
    </div>
  </div>
{% endmacro %}
