<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Climate Health Data Platform</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css"
    />
    <link
      href="{{ url_for('static', filename='css/styles.css') }}"
      rel="stylesheet"
    />

    <script src="{{ url_for('static', filename='js/footer.js') }}" type="text/javascript" defer></script>

    <script src="{{ url_for('static', filename='js/header.js') }}" type="text/javascript" defer></script>

  </head>
  <body class="bg-gray-200">

    <header-component></header-component>

    <div class="bg-gray-100">

      <div
        class="py-8 px-4 mx-auto max-w-screen lg:py-16 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg"
      >
        <div class="p-4">
          <div class="bg-white p-4 mb-4">
            <div>
              <label
                for="dateCol"
                class="block mb-5 text-2xl font-medium text-gray-900 dark:text-white"
                >Select region to plot:</label
              >
              <select
                type="file"
                id="dataColumn"
                multiple
                aria-describedby="helper-text2"
                size="8"
                class="form-multiselect bg-gray-50 border border-gray-300 text-gray-900 text-2xl rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
              ></select>
              <p
                id="helper-text2"
                class="mt-2 text-2xl text-gray-500 dark:text-gray-400"
              >
                Select the region to wish to plot for this indicator.
              </p>
            </div>
          </div>
          <div class="flex flex-wrap -mx-2">
            <div class="map-container w-full md:w-1/3 pr-6 h-screen">
              <div id="map" style="width: 100%; height: 700px"></div>
            </div>
            <div class="=container w-full md:w-2/3 h-screen">
              <div id="plotlyChart" style="height: 700px"></div>
            </div>
          </div>
        </div>
      </div>

      <footer-component></footer-component>

    </div>

    <!-- PapaParse Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

    <!-- Plotly Library -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <!-- Your main JavaScript -->
    <script src="{{ url_for('static', filename='js/tabs.js') }}"></script>
    <script src="{{ url_for('static', filename='js/data_plots.js') }}"></script>
  </body>
</html>
