version: "3.8"

services:
  web:
    build:
      dockerfile: data-explorer.Dockerfile
      context: .
    ports:
      - "5000:5001"
    volumes:
      - .:/usr/src/app
    depends_on:
      - db
      # - migration
    environment:
      - FLASK_ENV=development
      - FLASK_APP=data_explorer
      # - FLASK_APP=app.py
      - LOAD_DUMMY_DATA=True

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=data-explorer-db
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432

  # migration:
