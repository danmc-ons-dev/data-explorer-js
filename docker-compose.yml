  #   volumes:
  #     - ./migrations:/migrations
  #   ports:
  #     - 5432:5432
  #   depends_on:
  #     - db
  #   environment:
  #     - POSTGRES_HOST=db
  #     - POSTGRES_DB=data-explorer-db
  #     - POSTGRES_USER=myuser
  #     - POSTGRES_PASSWORD=mypassword
  #   command: >
  #     bash -c "
  #     until pg_isready -h $$POSTGRES_HOST; do
  #       echo 'Waiting for DB';
  #       sleep 2;
  #     done;
  #     psql -h db -U myuser -d data-explorer-db -f /migrations/01-initial-migrations.sql;
  #     "
  #   restart: on-failure

volumes:
  postgres_data:
