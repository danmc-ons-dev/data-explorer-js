# eksctl cluster configuration for the personal AWS learning environment.
#
# Usage:  eksctl create cluster -f eksctl-personal.yaml
# Teardown: eksctl delete cluster -f eksctl-personal.yaml
#
# Cost (us-east-1, running 24/7):
#   EKS control plane : $0.10/hr  = ~$73/month
#   1x t3.small node  : $0.0208/hr = ~$15/month
#   Approx total      : ~$88/month
#
# Cost tip: delete the cluster when you're not actively learning.
#   eksctl delete cluster -f eksctl-personal.yaml
#   eksctl create cluster -f eksctl-personal.yaml   (takes ~15 min to recreate)

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: data-explorer-personal
  region: us-east-1        # change to match the region you chose during setup

# eksctl creates a new VPC with correctly-tagged public/private subnets automatically.
# The public subnet tags (kubernetes.io/role/elb: 1) allow the NLB to be internet-facing.

managedNodeGroups:
  - name: ng-1
    instanceType: t3.small  # 2 vCPU, 2 GB RAM — enough for one Flask app in dummy mode
    desiredCapacity: 1       # 1 node is sufficient for learning
    minSize: 1
    maxSize: 1
    volumeSize: 20           # 20 GB EBS root volume (GP3 by default in newer eksctl)
    # Cost tip: you can scale nodes to 0 when not testing to save the node cost,
    # while keeping the control plane alive so your config is preserved:
    #   eksctl scale nodegroup --cluster=data-explorer-personal --name=ng-1 --nodes=0
    # Scale back up with --nodes=1 when you want to deploy again.
