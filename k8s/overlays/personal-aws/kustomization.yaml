apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This overlay is for a personal AWS learning environment.
# It deploys ONLY the web app in dummy mode (no database, no R API, no migrations).
# All existing overlays (dev-cluster, live) are completely untouched.

namespace: data-explorer-personal

# Reference only the data-explorer deployment from the shared base resources.
# We deliberately exclude postgres and r-api — they are not needed in dummy mode.
# Must point to the directory (which has its own kustomization.yaml), not the .yaml file directly —
# kustomize's security model forbids referencing individual files via ../ traversal.
resources:
  - ../../resources/data-explorer
  - service.yaml

# Mount config.yml into the container via a ConfigMap.
# The app's load_app_config() reads /usr/src/app/config.yml at startup.
configMapGenerator:
  - name: app-config
    files:
      - config.yml

# Point to the personal ECR repository.
# Replace ACCOUNT_ID and REGION with your values (Part 4 of the setup guide).
images:
  - name: data-explorer
    newName: 201243086459.dkr.ecr.us-east-1.amazonaws.com/ons-climate-health/data-explorer
    newTag: latest

patches:
  # Strategic merge patch: sets replicas, removes DB env refs, adds config volume.
  - path: deployment-patch.yaml

  # Strategic merge patch: overrides imagePullPolicy to Always (matches dev-cluster pattern).
  - path: imagepull-patch.yaml

  # JSON patch: completely removes the initContainers list.
  # The base deployment has a migrations init container that needs postgres — we don't want that here.
  - target:
      kind: Deployment
      name: data-explorer
    patch: |-
      - op: remove
        path: /spec/template/spec/initContainers
