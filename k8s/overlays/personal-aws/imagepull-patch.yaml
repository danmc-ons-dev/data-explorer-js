# Mirrors the imagepull.patch.yaml pattern from the dev-cluster overlay.
# The base deployment uses imagePullPolicy: Never (for local minikube use).
# We override it to Always so EKS always pulls the latest image from ECR.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-explorer
spec:
  template:
    spec:
      containers:
        - name: data-explorer
          imagePullPolicy: Always
