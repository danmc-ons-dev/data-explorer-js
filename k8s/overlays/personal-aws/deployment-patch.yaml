apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-explorer
spec:
  # Only 1 replica — enough to learn, saves cost vs the 4 replicas in production.
  replicas: 1
  template:
    spec:
      containers:
        - name: data-explorer
          # Remove the postgres ConfigMap + Secret env references from the base deployment.
          # In dummy mode the app doesn't talk to a database at all.
          envFrom: null
          env:
            # Inject the Flask secret key from a Kubernetes Secret.
            # Create this secret manually once: see the setup guide (AWS Part, Step 9).
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SECRET_KEY
          volumeMounts:
            - name: config-volume
              mountPath: /usr/src/app/config.yml
              subPath: config.yml
          ports:
            # The app runs on 5001 (see data_explorer/__main__.py).
            # The base deployment documents port 5000, which is misleading — this corrects it.
            - containerPort: 5001
      volumes:
        - name: config-volume
          configMap:
            name: app-config
            items:
              - key: config.yml
                path: config.yml
