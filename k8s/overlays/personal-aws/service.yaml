# Mirrors the data-explorer-lb.yaml approach from the dev-cluster overlay.
# Uses the in-tree AWS NLB controller (no additional controller installation required).
# Creates an internet-facing Network Load Balancer on port 80 -> pod port 5001.
apiVersion: v1
kind: Service
metadata:
  name: data-explorer-service
  annotations:
    # "nlb" triggers the in-tree AWS NLB provider.
    # This is simpler than "external" which requires the AWS Load Balancer Controller add-on.
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 5001
      protocol: TCP
  selector:
    app: data-explorer
