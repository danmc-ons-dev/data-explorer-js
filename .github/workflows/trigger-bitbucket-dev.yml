name: Trigger Bitbucket Dev Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# Purpose
# ─────────────────────────────────────────────────────────────────────────────
# Homelab replacement for the AWS Lambda webhook proxy used in production.
#
# When a version tag (v*) is pushed to this GitHub repo, this workflow calls
# the Bitbucket Pipelines API to trigger the cwh-dev-wrapper custom pipeline
# on the 'dan-onsuk-climhealth' orchestration repo.
#
# The Bitbucket pipeline then clones all three app repos at their latest tags,
# builds Docker images, pushes to Harbor, and deploys to the dev namespace.
#
# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub repository secrets (Settings → Secrets → Actions):
#   BITBUCKET_USERNAME      Your Bitbucket account username
#   BITBUCKET_API_TOKEN     Bitbucket API Token with scope: Pipelines: Write
#                           Create at: https://bitbucket.org/account/settings/api-tokens/
#                           NOTE: App passwords are removed July 28 2026. Use API tokens.
#   BITBUCKET_WORKSPACE     Your Bitbucket workspace slug (e.g. "danmcmyler")
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'

jobs:
  trigger-bitbucket-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Trigger Bitbucket cwh-dev-wrapper pipeline
        env:
          BB_USER: ${{ secrets.BITBUCKET_USERNAME }}
          BB_PASS: ${{ secrets.BITBUCKET_API_TOKEN }}
          BB_WORKSPACE: ${{ secrets.BITBUCKET_WORKSPACE }}
          BB_REPO: dan-onsuk-climhealth
          TRIGGERED_BY_REPO: ${{ github.repository }}
          TRIGGERED_BY_TAG: ${{ github.ref_name }}
        run: |
          echo "Triggering Bitbucket pipeline for tag: ${TRIGGERED_BY_TAG}"
          echo "Triggered by repo: ${TRIGGERED_BY_REPO}"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -u "${BB_USER}:${BB_PASS}" \
            -H "Content-Type: application/json" \
            "https://api.bitbucket.org/2.0/repositories/${BB_WORKSPACE}/${BB_REPO}/pipelines/" \
            -d "{
              \"target\": {
                \"ref_type\": \"branch\",
                \"type\": \"pipeline_ref_target\",
                \"ref_name\": \"dev\",
                \"selector\": {
                  \"type\": \"custom\",
                  \"pattern\": \"cwh-dev-wrapper\"
                }
              },
              \"variables\": [
                {
                  \"key\": \"TRIGGERED_BY_REPO\",
                  \"value\": \"${TRIGGERED_BY_REPO}\"
                },
                {
                  \"key\": \"TRIGGERED_BY_TAG\",
                  \"value\": \"${TRIGGERED_BY_TAG}\"
                }
              ]
            }")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: ${HTTP_STATUS}"
          echo "Response body: ${BODY}"

          if [ "${HTTP_STATUS}" != "201" ]; then
            echo "ERROR: Failed to trigger Bitbucket pipeline (HTTP ${HTTP_STATUS})"
            exit 1
          fi

          BUILD_NUMBER=$(echo "${BODY}" | python3 -c \
            "import sys, json; d=json.load(sys.stdin); print(d.get('build_number','unknown'))" 2>/dev/null || echo "unknown")
          echo "Bitbucket pipeline triggered successfully."
          echo "Build number: ${BUILD_NUMBER}"
          echo "Monitor at: https://bitbucket.org/${BB_WORKSPACE}/${BB_REPO}/addon/pipelines/home"
